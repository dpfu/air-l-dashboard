name: Update Air-L Index

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Scrape current month
        run: python -m scripts.scrape
      - name: Build public JSON and feeds
        run: |
          python -m scripts.build_public_data
          python -m scripts.build_feeds
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public data/internal site/data site/feeds
          git diff --cached --quiet || git commit -m "chore: update Air-L index data"
          git push
