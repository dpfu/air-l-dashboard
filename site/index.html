<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AoIR Air-L Public Index</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>AoIR Air-L Public Research Index</h1>
    <p>Minimal metadata only. No full-text mirror, no names, no email addresses.</p>
  </header>

  <section class="controls">
    <input id="search" type="search" placeholder="Search subject/snippet..." />
    <select id="categoryFilter"><option value="">All categories</option></select>
    <input id="tagFilter" type="text" placeholder="Filter by tag (e.g. cfp)" />
    <label><input id="deadlineOnly" type="checkbox" /> only with deadline</label>
    <select id="sortBy">
      <option value="newest">Newest first</option>
      <option value="deadline">Deadline first</option>
    </select>
  </section>

  <main id="results"></main>

  <footer>
    <a href="feeds/all.xml">RSS all</a> |
    <a href="legal/impressum.html">Impressum</a> |
    <a href="legal/privacy.html">Privacy</a> |
    <a href="legal/opt-out.html">Opt-out</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
  <script src="app.js"></script>
</body>
</html>
